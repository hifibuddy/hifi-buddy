<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiFi Buddy — Critical-listening tutor for audiophiles</title>
    <meta name="description" content="Train your ears on real reference recordings. 30 curated lessons, ABX blind testing, frequency visualizer, equipment-aware annotations.">
    <link rel="stylesheet" href="styles.css?v=16">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="hb-header">
            <div class="hb-header-inner">
                <a href="/" class="hb-logo" data-view="lessons" aria-label="HiFi Buddy home">
                    <svg viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
                        <defs>
                            <linearGradient id="hbLogoGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#9b59b6"/>
                                <stop offset="100%" stop-color="#667eea"/>
                            </linearGradient>
                        </defs>
                        <rect x="3" y="13" width="2.5" height="6" rx="1.25" fill="url(#hbLogoGrad)"/>
                        <rect x="8" y="9" width="2.5" height="14" rx="1.25" fill="url(#hbLogoGrad)"/>
                        <rect x="13" y="5" width="2.5" height="22" rx="1.25" fill="url(#hbLogoGrad)"/>
                        <rect x="18" y="9" width="2.5" height="14" rx="1.25" fill="url(#hbLogoGrad)"/>
                        <rect x="23" y="13" width="2.5" height="6" rx="1.25" fill="url(#hbLogoGrad)"/>
                    </svg>
                    <span class="hb-logo-text">HiFi <span class="hb-logo-accent">Buddy</span></span>
                </a>
                <nav class="hb-nav" aria-label="Primary">
                    <button class="hb-nav-btn active" data-view="lessons" aria-current="page">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                        Lessons
                    </button>
                    <button class="hb-nav-btn" data-view="refbank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M9 7h6"/></svg>
                        Reference Library
                    </button>
                    <button class="hb-nav-btn" data-view="stats">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-7"/><circle cx="7" cy="14" r="1.2" fill="currentColor"/><circle cx="11" cy="10" r="1.2" fill="currentColor"/><circle cx="15" cy="14" r="1.2" fill="currentColor"/><circle cx="20" cy="7" r="1.2" fill="currentColor"/></svg>
                        Stats
                    </button>
                </nav>
                <div class="hb-header-actions">
                    <button class="hb-icon-btn" id="themeToggle" title="Toggle light/dark theme" aria-label="Toggle light/dark theme"></button>
                    <button class="hb-icon-btn" id="settingsBtn" title="Settings" aria-label="Open settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="hb-main" id="hbMain">
            <!-- View containers -->
            <div class="hifi-container" id="lessonsContainer"></div>
            <div class="reference-bank-container" id="refbankContainer" style="display:none"></div>
            <div class="abx-stats-container" id="statsContainer" style="display:none"></div>
        </main>
    </div>

    <!-- Audio Player Bar -->
    <div class="audio-player-bar" id="audioPlayerBar" style="display:none"></div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="settingsHeading">
        <div class="modal">
            <div class="modal-header">
                <h3 id="settingsHeading">Settings</h3>
                <button class="modal-close" id="closeSettings" aria-label="Close settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="settingsBody"></div>
        </div>
    </div>

    <!-- Onboarding Wizard (first-run) -->
    <div class="onboarding-overlay" id="onboardingOverlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="onboardingCard">
        <div class="onboarding-card" id="onboardingCard"></div>
    </div>

    <!-- Scripts: order matters -->
    <script src="js/toast.js?v=10"></script>
    <script src="js/icons.js?v=11"></script>
    <script src="js/settings.js?v=17"></script>
    <script src="js/audio-player.js?v=11"></script>
    <script src="js/spotify.js?v=10"></script>
    <script src="js/plex.js?v=14"></script>
    <script src="js/local-library.js?v=10"></script>
    <script src="js/musicbrainz.js?v=10"></script>
    <script src="js/abx.js?v=12"></script>
    <script src="js/abx-stats.js?v=10"></script>
    <script src="js/visualizer.js?v=10"></script>
    <script src="js/track-picker.js?v=11"></script>
    <script src="js/lesson-generator.js?v=12"></script>
    <script src="js/timing-feedback.js?v=11"></script>
    <script src="js/hifi-buddy.js?v=19"></script>
    <script src="js/reference-bank.js?v=12"></script>
    <script src="js/onboarding.js?v=11"></script>
    <script src="js/app.js?v=12"></script>

    <div class="offline-indicator" id="offlineIndicator">Offline</div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('[SW] Registered:', reg.scope))
                    .catch(err => console.warn('[SW] Registration failed:', err));
            });
        }
        window.addEventListener('online', () => document.getElementById('offlineIndicator').classList.remove('visible'));
        window.addEventListener('offline', () => document.getElementById('offlineIndicator').classList.add('visible'));
        if (!navigator.onLine) document.getElementById('offlineIndicator').classList.add('visible');

        // Theme toggle (dark default)
        (() => {
            const saved = localStorage.getItem('hifibuddy_theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            const btn = document.getElementById('themeToggle');
            if (btn) {
                const SUN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
                const MOON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                const update = () => {
                    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                    btn.innerHTML = isLight ? SUN_SVG : MOON_SVG;
                    btn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
                    btn.setAttribute('aria-label', btn.title);
                    btn.setAttribute('aria-pressed', isLight ? 'true' : 'false');
                };
                update();
                btn.addEventListener('click', () => {
                    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                    const next = isLight ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('hifibuddy_theme', next);
                    update();
                });
            }
        })();
    </script>
</body>
</html>
